apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: switches
  name: switch-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: switches
  template:
    metadata:
      labels:
        app: switches
    spec:
      containers:
      - env:
        - name: KASA_USERNAME
          valueFrom:
            secretKeyRef:
              key: kasa-username
              name: kasa-creds
        - name: KASA_PASSWORD
          valueFrom:
            secretKeyRef:
              key: kasa-password
              name: kasa-creds
        image: saxenavinayak/sugar-lane:5bc1db46855fe1c7805c68b552197b3dcaca6322
        imagePullPolicy: Always
        name: switch
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: regcred
